name: Build wheels

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64

          - os: ubuntu-24.04-arm
            arch: aarch64

          - os: macos-13
            arch: x86_64

          - os: macos-14
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          extras: uv
        env:
          CIBW_BUILD: "cp314-*"
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_BUILD_VERBOSITY: "1"
          CIBW_TEST_COMMAND: "python -c \"import pydesigner; import pydesigner.fitting.dwipy; print('PyDesigner wheel import OK')\""

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python
        run: uv python install 3.14

      - name: Build sdist
        run: uv build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz

  check_artifacts:
    name: Check built distributions
    needs:
      - build_wheels
      - build_sdist
    runs-on: ubuntu-latest

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Show distributions
        run: ls -lh dist

      - name: Check metadata
        run: uvx twine check --strict dist/*